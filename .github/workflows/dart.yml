name: Build Flutter Web and Deploy to Pages Repo

on:
  push:
    branches: ["flutterflow"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ---------- BUILD WEB ----------
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/"

      # ---------- BUILD ANDROID APK ----------
      - name: Setup Java (for Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Ensure Flutter is available
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies (Android)
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Package outputs
        run: |
          mkdir -p out
          # Ruta correcta del APK generado por Flutter
          cp build/app/outputs/flutter-apk/app-release.apk out/app-release.apk

      # ---------- DEPLOY APK A REPO SEPARADO ----------
      - name: Deploy to mobile
        run: |
          git clone https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/00danielle00/MixItUp_apk mobile-repo
          rm -rf mobile-repo/*
          cp out/app-release.apk mobile-repo/
          cd mobile-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy Android build" || echo "No changes to commit"
          git push
